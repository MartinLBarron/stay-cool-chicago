<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n-title="appName">Stay Cool Chicago</title>
  <meta name="description" content="Cooling center hours, directions, and amenities." />
  <meta name="theme-color" content="#0a2a55" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/assets/icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>

  <a class="skip-link" href="#main">Skip to main content</a>

  <div class="page">
    <div id="advisory-container" hidden></div>

    <header class="page-header" style="padding:12px var(--page-pad);border-bottom:1px solid var(--color-hair);">
      <a class="brand-mark" href="index.html" aria-label="Stay Cool Chicago — home">
        <svg width="22" height="22" viewBox="0 0 28 28" aria-hidden="true" focusable="false">
          <rect x="2" y="2" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="14" cy="14" r="5" fill="none" stroke="currentColor" stroke-width="2"/>
          <line x1="14" y1="4"  x2="14" y2="7"  stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          <line x1="14" y1="21" x2="14" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          <line x1="4"  y1="14" x2="7"  y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
          <line x1="21" y1="14" x2="24" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="square"/>
        </svg>
        <span class="brand-name" data-i18n="appName">Stay Cool Chicago</span>
      </a>
      <button class="lang-toggle" id="lang-toggle" style="margin-left:auto;" aria-label="Switch language">
        <span data-i18n="langToggle">Español</span>
      </button>
    </header>

    <main id="main">

      <!-- Loading -->
      <div id="center-loading" style="padding:48px var(--page-pad);text-align:center;"
           role="status" aria-live="polite">
        <p style="color:var(--color-ink-mute);font-size:0.9375rem;">Loading center…</p>
      </div>

      <!-- Error -->
      <div id="center-error" hidden
           style="padding:48px var(--page-pad);text-align:center;color:var(--color-ink-mute);">
        <p style="font-weight:700;font-size:1.0625rem;color:var(--color-ink);margin-bottom:10px;">Center not found.</p>
        <a href="home.html" style="font-weight:700;color:var(--color-ink);">← Back to nearest center</a>
      </div>

      <!-- Content (revealed after load) -->
      <div id="center-content" hidden>

        <!-- Status + name + type -->
        <div class="detail-header">
          <div id="status-chip"></div>
          <div class="detail-name-row">
            <div id="detail-type-icon" class="detail-type-icon"></div>
            <div>
              <h1 id="detail-name" class="detail-name"></h1>
              <p  id="detail-type" class="text-caption mute" style="margin-top:5px;"></p>
            </div>
          </div>
        </div>

        <!-- Address (tappable → map view) -->
        <a id="detail-address" class="detail-address-link" target="_blank" rel="noopener noreferrer">
          <span id="detail-address-text"></span>
        </a>

        <!-- Mini map -->
        <div id="mini-map" style="height:200px;border-bottom:1px solid var(--color-hair);"></div>

        <!-- Hours today -->
        <div id="hours-row" style="padding:14px var(--page-pad);border-bottom:1px solid var(--color-hair);">
          <p class="text-overline" style="margin-bottom:5px;" data-i18n="hoursToday">Hours today</p>
          <p id="hours-text" style="font-size:1.0625rem;font-weight:700;"></p>
        </div>

        <!-- Full hours from dataset -->
        <div id="hours-full-row" hidden
             style="padding:14px var(--page-pad);border-bottom:1px solid var(--color-hair);">
          <p class="text-overline" style="margin-bottom:5px;" data-i18n="hoursLabel">Hours</p>
          <p id="hours-raw-text"
             style="font-size:0.9375rem;line-height:1.55;color:var(--color-ink);white-space:pre-line;"></p>
        </div>

        <!-- Amenities (hidden until data source is available) -->
        <div class="detail-amenities" hidden>
          <p class="text-overline" style="margin-bottom:14px;" data-i18n="amenities">What's available</p>
          <div id="amenities-content"></div>
        </div>

        <!-- Notes -->
        <div id="amenity-notes" hidden
             style="padding:0 var(--page-pad) 16px;font-size:0.875rem;color:var(--color-ink-mute);font-style:italic;">
        </div>

        <!-- Walk / transit stats (only when user has location) -->
        <div id="stats-row" hidden class="stat-grid" style="margin:0 var(--page-pad);">
          <div class="stat">
            <p class="stat-label" data-i18n="minWalk">min walk</p>
            <p class="stat-value" id="stat-walk">—</p>
          </div>
          <div class="stat">
            <p class="stat-label" data-i18n="minTransit">min by transit</p>
            <p class="stat-value" id="stat-transit">—</p>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="detail-actions">
          <a id="btn-directions" class="btn btn-primary" target="_blank" rel="noopener noreferrer"
             style="justify-content:center;" data-i18n="getDirections">Get directions</a>
          <a id="btn-call" class="btn btn-secondary" hidden
             style="justify-content:center;gap:8px;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" focusable="false">
              <path d="M3 3h4l1.5 4-2 1.5a10 10 0 004 4l1.5-2 4 1.5V15a2 2 0 01-2 2C6.3 17 1 11.7 1 5a2 2 0 012-2z"
                    fill="currentColor"/>
            </svg>
            <span data-i18n="callCenter">Call</span>
          </a>
        </div>

        <!-- Footer -->
        <footer class="site-footer">
          <a href="/about.html" data-i18n="aboutLink">A neighbor-built service</a>
          &nbsp;·&nbsp;
          <a href="https://data.cityofchicago.org/Health-Human-Services/Cooling-Centers-Map/cj7n-sh49"
             target="_blank" rel="noopener noreferrer"
             data-i18n="cityDataLink">City of Chicago data</a>
        </footer>

      </div><!-- /#center-content -->

    </main>
  </div><!-- /.page -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module">
    import { initLang, getLang, getCopy, applyLang } from '/js/lang.js';
    import { initAdvisory }                          from '/js/advisory.js';
    import { fetchCenters, fetchAmenities,
             computeTravelTimes, isOpenNow,
             closingTimeLabel, openingTimeLabel }    from '/js/data.js';
    import { getDirectionsURLs, getLocationURL }      from '/js/directions.js';
    import { typeIcon }                               from '/js/icons.js';
    import copy                                      from '/js/copy.js';

    const lang = initLang('lang-toggle');
    initAdvisory(lang, copy);
    let t = getCopy(lang);

    // ── Helpers ────────────────────────────────────────────────────────
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Amenity icon map ───────────────────────────────────────────────
    const AMENITY_SVG = {
      wheelchair: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="8" cy="2.5" r="1.5" fill="currentColor"/>
        <path d="M5.5 5.5h3l1 3.5H12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M7 5.5L5.5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="5.5" cy="13" r="2" stroke="currentColor" stroke-width="1.4" fill="none"/>
        <circle cx="10.5" cy="13" r="2" stroke="currentColor" stroke-width="1.4" fill="none"/>
      </svg>`,
      pets: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="5" cy="4"  r="1.3" fill="currentColor"/>
        <circle cx="11" cy="4" r="1.3" fill="currentColor"/>
        <circle cx="2.5" cy="8" r="1.3" fill="currentColor"/>
        <circle cx="13.5" cy="8" r="1.3" fill="currentColor"/>
        <ellipse cx="8" cy="12" rx="3.5" ry="2.5" fill="currentColor"/>
      </svg>`,
      wifi: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M1.5 6.5a9 9 0 0113 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M4 9.5a5 5 0 018 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M6.5 12.5a2.5 2.5 0 013 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="8" cy="14.5" r="1" fill="currentColor"/>
      </svg>`,
      water: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 2L4 9a4 4 0 008 0L8 2z" fill="currentColor"/>
      </svg>`,
      restrooms: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="5.5" cy="3" r="1.5" fill="currentColor"/>
        <path d="M3 6h5l-1 7H4L3 6z" fill="currentColor"/>
        <circle cx="10.5" cy="3" r="1.5" fill="currentColor"/>
        <path d="M9 6h3l1 3.5h-1L12.5 13h-4L9 9.5H8L9 6z" fill="currentColor"/>
      </svg>`,
      seating: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <rect x="2" y="6" width="12" height="3" rx="1" fill="currentColor"/>
        <rect x="3" y="3" width="10" height="3" rx="1" fill="currentColor"/>
        <rect x="3" y="9" width="2" height="4" rx="1" fill="currentColor"/>
        <rect x="11" y="9" width="2" height="4" rx="1" fill="currentColor"/>
      </svg>`,
    };

    const AMENITY_KEYS = ['wheelchair', 'pets', 'wifi', 'water', 'restrooms', 'seating'];

    // ── Module-level state for lang re-renders ─────────────────────────
    let loadedCenter  = null;
    let loadedAmenity = null;

    // ── Main load ──────────────────────────────────────────────────────
    const id = new URLSearchParams(location.search).get('id');

    if (!id) {
      showError();
    } else {
      Promise.all([fetchCenters(), fetchAmenities()]).then(([centers, amenities]) => {
        const center = centers.find(c => c.id === id);
        if (!center) { showError(); return; }
        loadedCenter  = center;
        loadedAmenity = amenities[id] || null;
        render(center, loadedAmenity);
      }).catch(showError);
    }

    function showError() {
      document.getElementById('center-loading').hidden = true;
      document.getElementById('center-error').hidden   = false;
    }

    function render(center, amenity) {
      document.getElementById('center-loading').hidden  = true;
      document.getElementById('center-content').hidden  = false;

      try {
        navigator.sendBeacon('/api/analytics.php', JSON.stringify({
          page: 'center', centerId: center.id, centerName: center.name,
        }));
      } catch {}

      // ── Name & type ──────────────────────────────────────────────
      document.getElementById('detail-type-icon').innerHTML = typeIcon(center.type, 40);
      document.getElementById('detail-name').textContent = center.name;
      document.getElementById('detail-type').textContent = center.type || '';
      document.title = center.name;

      // ── Status chip ──────────────────────────────────────────────
      renderStatusChip(center.hoursToday);

      // ── Hours row ────────────────────────────────────────────────
      const hoursText = document.getElementById('hours-text');
      if (center.hoursToday && center.hoursToday !== 'Closed') {
        hoursText.textContent = center.hoursToday;
        document.getElementById('hours-row').hidden = false;
      } else if (center.hoursToday === 'Closed') {
        hoursText.textContent = t.closedToday;
        document.getElementById('hours-row').hidden = false;
      } else {
        document.getElementById('hours-row').hidden = true;
      }

      // ── Full hours from dataset ──────────────────────────────────
      const hoursFullRow  = document.getElementById('hours-full-row');
      const hoursRawText  = document.getElementById('hours-raw-text');
      if (center.hoursRaw && center.hoursRaw.trim()) {
        hoursRawText.textContent = center.hoursRaw.trim();
        hoursFullRow.hidden = false;
      } else {
        hoursFullRow.hidden = true;
      }

      // ── Address ──────────────────────────────────────────────────
      const { primary: dirUrl } = getDirectionsURLs(center.lat, center.lng);
      const addrLink = document.getElementById('detail-address');
      document.getElementById('detail-address-text').textContent = center.address;
      addrLink.href = getLocationURL(center.lat, center.lng);

      // ── Mini map ──────────────────────────────────────────────────
      const miniMap = L.map('mini-map', {
        center: [center.lat, center.lng],
        zoom: 15,
        zoomControl: false,
        scrollWheelZoom: false,
        attributionControl: true,
      });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19,
      }).addTo(miniMap);
      L.marker([center.lat, center.lng]).addTo(miniMap);
      setTimeout(() => miniMap.invalidateSize(), 50);

      // ── Walk / transit ───────────────────────────────────────────
      const userLat  = parseFloat(sessionStorage.getItem('userLat') || '');
      const userLng  = parseFloat(sessionStorage.getItem('userLng') || '');
      const times    = computeTravelTimes(userLat, userLng, center.lat, center.lng);
      const statsRow = document.getElementById('stats-row');
      if (times) {
        document.getElementById('stat-walk').textContent    = times.walkMin;
        document.getElementById('stat-transit').textContent = times.transitMin;
        statsRow.hidden = false;
      } else {
        statsRow.hidden = true;
      }

      // ── Directions button ────────────────────────────────────────
      document.getElementById('btn-directions').href = dirUrl;

      // ── Call button ──────────────────────────────────────────────
      if (center.phone) {
        const callBtn = document.getElementById('btn-call');
        callBtn.href   = `tel:${center.phone.replace(/\D/g, '')}`;
        callBtn.hidden = false;
      }

      // ── Amenities ────────────────────────────────────────────────
      renderAmenities(amenity, center.phone);

      // ── "See other centers" preserves location ───────────────────
      // home.html reads sessionStorage, so just linking to home.html is enough
    }

    function renderStatusChip(hoursToday) {
      const el = document.getElementById('status-chip');
      if (!hoursToday || hoursToday === '') {
        el.innerHTML = '';
        return;
      }
      if (hoursToday === 'Closed') {
        el.innerHTML = `<div class="chip chip-closed" style="display:inline-flex;">${esc(t.closedToday)}</div>`;
        return;
      }
      if (isOpenNow(hoursToday)) {
        const closeAt = closingTimeLabel(hoursToday);
        el.innerHTML = `
          <div class="chip chip-open" style="display:inline-flex;">
            <span class="chip-dot" aria-hidden="true"></span>
            <span>${closeAt ? esc(t.openUntil) + ' ' + esc(closeAt) : esc(t.openNow)}</span>
          </div>`;
      } else {
        const openAt = openingTimeLabel(hoursToday);
        el.innerHTML = `
          <div class="chip chip-closed" style="display:inline-flex;">
            ${openAt ? esc(t.opensAt) + ' ' + esc(openAt) : esc(t.closedNow)}
          </div>`;
      }
    }

    function renderAmenities(amenity, phone) {
      const container = document.getElementById('amenities-content');
      const notesEl   = document.getElementById('amenity-notes');

      if (!amenity) {
        container.innerHTML = `
          <p style="font-size:0.9375rem;color:var(--color-ink-mute);line-height:1.5;"
             data-i18n="noAmenityData">${esc(t.noAmenityData)}</p>`;
        return;
      }

      const available = AMENITY_KEYS.filter(k => amenity[k] === true);
      if (available.length === 0) {
        container.innerHTML = `<p style="font-size:0.9375rem;color:var(--color-ink-mute);"
                                   data-i18n="noAmenityData">${esc(t.noAmenityData)}</p>`;
        return;
      }

      container.innerHTML = `
        <ul class="amenity-list">
          ${available.map(k => `
            <li class="amenity-chip">
              ${AMENITY_SVG[k] ?? ''}
              ${esc(t[k])}
            </li>`).join('')}
        </ul>`;

      if (amenity.notes) {
        notesEl.textContent = amenity.notes;
        notesEl.hidden = false;
      }
    }

    // ── Language toggle: re-render JS-injected content ─────────────────
    // initLang handles all data-i18n elements; we only need to refresh
    // the dynamic status chip and amenities which are built in JS.
    document.getElementById('lang-toggle').addEventListener('click', () => {
      t = getCopy(getLang());
      if (loadedCenter) {
        renderStatusChip(loadedCenter.hoursToday);
        renderAmenities(loadedAmenity, loadedCenter.phone);
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>

</body>
</html>
